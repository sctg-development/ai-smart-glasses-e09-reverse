name: Release

on:
  release:
    types: [published]

jobs:
  build-arm64:
    name: Build (Apple Silicon)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Build (Release)
        run: swift build -c release

      - name: Create archive
        run: |
          ARCHIVE_NAME="e09_reverse-arm64.zip"
          zip -j "$ARCHIVE_NAME" ".build/release/e09_reverse"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-x86_64:
    name: Build (Intel)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Build (Release)
        run: swift build -c release

      - name: Create archive
        run: |
          ARCHIVE_NAME="e09_reverse-x86_64.zip"
          zip -j "$ARCHIVE_NAME" ".build/release/e09_reverse"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}